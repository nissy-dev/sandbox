name: pnpm ignore-scripts lab

on:
  workflow_dispatch:
    inputs:
      case:
        description: Run all cases or a single case directory under pnpm-ignore-scripts-lab/cases/
        type: choice
        default: all
        options:
          - all
          - case-default-no-config
          - case-npmrc-ignore-scripts
          - case-only-built-allows-test
          - case-only-built-includes-test
          - case-only-built-includes-test-ignore-dep-scripts-false

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - case: case-default-no-config
          - case: case-npmrc-ignore-scripts
          - case: case-only-built-allows-test
          - case: case-only-built-includes-test
          - case: case-only-built-includes-test-ignore-dep-scripts-false
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          package_json_file: pnpm-ignore-scripts-lab/cases/${{ matrix.case }}/package.json
      - name: pnpm install
        if: ${{ github.event.inputs.case == 'all' || github.event.inputs.case == matrix.case }}
        working-directory: pnpm-ignore-scripts-lab/cases/${{ matrix.case }}
        run: pnpm install --frozen-lockfile
